name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ] # main 브랜치에 push될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 1. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Gradle 빌드 (테스트 제외로 속도 향상)
      # chmod +x ./gradlew : 리눅스 환경에서 Gradle 실행 파일(gradlew)에 실행 권한을 부여합니다.
      #
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew 
          ./gradlew clean build -x test

      # 3. [SSH] 기존 서버 종료 및 파일 물리적 삭제 강화
      - name: Stop Old Server & Clean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "--- 기존 프로세스 정리 시작 ---"
            # 1. 'YakSok'이 들어간 자바 프로세스만 찾아 PID 추출 (grep -v grep으로 자기 자신 제외)
            PIDS=$(ps -ef | grep 'YakSok' | grep 'java' | grep -v 'grep' | awk '{print $2}')
            
            if [ -z "$PIDS" ]; then
              echo "실행 중인 YakSok 프로세스가 없습니다."
            else
              echo "다음 PID를 종료합니다: $PIDS"
              sudo kill -9 $PIDS
            fi
            
            echo "--- 파일 및 로그 초기화 ---"
            # 안전하게 폴더가 있는지 확인 후 삭제
            sudo rm -rf /home/ubuntu/app/*.jar
            sudo rm -f /home/ubuntu/app/nohup.out
            sudo rm -f /home/ubuntu/YakSok-0.0.1-SNAPSHOT.jar
            
            echo "--- 정리 완료 ---"
            ls -al /home/ubuntu/app/

      # 4. [SCP] 빌드된 새 jar 파일을 깨끗해진 EC2 폴더로 전송
      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      # 5. [SSH] 새로 전송된 최신 서버 실행
      - name: Start New Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 최신 jar 파일을 찾아 백그라운드에서 실행
            nohup java -jar /home/ubuntu/app/*.jar --server.port=8081 > /home/ubuntu/app/nohup.out 2>&1 &