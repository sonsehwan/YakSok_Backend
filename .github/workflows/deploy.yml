name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ] # main 브랜치에 push될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 1. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Gradle 빌드 (테스트 제외로 속도 향상)
      # chmod +x ./gradlew : 리눅스 환경에서 Gradle 실행 파일(gradlew)에 실행 권한을 부여합니다.
      #
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew 
          ./gradlew clean build -x test

      # 3. [SSH] 기존 서버 종료 및 파일 물리적 삭제 강화
      - name: Stop Old Server & Clean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "--- 모든 YakSok 프로세스 종료 시작 ---"
            # 포트 번호에 상관없이 파일 이름에 'YakSok'이 들어간 모든 자바 프로세스 종료
            sudo pkill -f 'YakSok' || echo "실행 중인 프로세스 없음"
            
            echo "--- 기존 파일 및 로그 초기화 ---"
            # app 폴더 내의 이전 빌드 파일과 로그 삭제
            sudo rm -rf /home/ubuntu/app/*.jar
            sudo rm -f /home/ubuntu/app/nohup.out
            
            # [중요] app 폴더 밖에서 자꾸 살아나는 '유령 파일'도 삭제 (좀비 방지)
            sudo rm -f /home/ubuntu/YakSok-0.0.1-SNAPSHOT.jar
            
            # 삭제 결과 확인 로그
            echo "--- 남은 파일 목록 ---"
            ls -al /home/ubuntu/app/

      # 4. [SCP] 빌드된 새 jar 파일을 깨끗해진 EC2 폴더로 전송
      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      # 5. [SSH] 새로 전송된 최신 서버 실행
      - name: Start New Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 최신 jar 파일을 찾아 백그라운드에서 실행
            nohup java -jar /home/ubuntu/app/*.jar --server.port=8081 > /home/ubuntu/app/nohup.out 2>&1 &