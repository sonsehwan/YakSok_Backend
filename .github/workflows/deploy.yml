name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ] # main 브랜치에 push될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 1. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Gradle 빌드 (테스트 제외로 속도 향상)
      # chmod +x ./gradlew : 리눅스 환경에서 Gradle 실행 파일(gradlew)에 실행 권한을 부여합니다.
      #
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew 
          ./gradlew clean build -x test

      # 3. [SSH] 기존 서버 종료 및 파일 물리적 삭제 강화
      - name: Stop Old Server & Clean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "--- 기존 프로세스 종료 시작 ---"
            # 8080 포트 프로세스 강제 종료 (없어도 에러 무시)
            sudo fuser -k 8080/tcp || echo "실행 중인 프로세스 없음"
            
            echo "--- 기존 파일 삭제 시작 ---"
            # 디렉토리 내의 모든 jar 파일을 강제로 삭제
            sudo rm -rf /home/ubuntu/app/*.jar
            sudo rm -f /home/ubuntu/app/nohup.out
            
            # 삭제 확인 로그
            ls -al /home/ubuntu/app/

      # 4. [SCP] 빌드된 새 jar 파일을 깨끗해진 EC2 폴더로 전송
      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      # 5. [SSH] 새로 전송된 최신 서버 실행
      - name: Start New Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 최신 jar 파일을 찾아 백그라운드에서 실행
            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/nohup.out 2>&1 &