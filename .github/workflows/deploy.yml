name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ] # main 브랜치에 push될 때 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 1. JDK 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Gradle 빌드 (테스트 제외로 속도 향상)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      # 3. 빌드된 jar 파일을 EC2로 전송 및 실행
      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu # 또는 ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. 기존 8080 포트 프로세스 종료
            sudo fuser -k 8080/tcp || true
            
            # 2. 기존 실행 파일 및 로그 삭제 (용량 확보)
            # 배포 전에 이전 파일을 지워줘야 용량 부족 에러를 방지할 수 있습니다.
            rm -rf /home/ubuntu/app/*.jar
            rm -f /home/ubuntu/app/nohup.out
            
            # 3. 새 jar 파일 실행 및 로그 기록
            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/nohup.out 2>&1 &